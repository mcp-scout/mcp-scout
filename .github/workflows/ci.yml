name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # vitest@4 (engines: ^20.0.0 || ^22.0.0 || >=24.0.0) and eslint@10's
        # formatter (needs util.styleText, added in Node 20.12) both hard-require
        # Node 20+ — Node 18 was dropped from engines to match what's actually
        # verifiable, not left in the matrix to fail on tooling we don't control.
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run lint
        if: matrix.node-version == 20
      - run: npm run build
      - run: npm test
