name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build/test only, skip the actual publish)"
        type: boolean
        default: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      # Trusted Publishing (OIDC) needs npm >=11.5.1 — don't rely on whatever
      # version Node 22 happens to bundle.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - run: npm test
      # No token: authenticates via OIDC using the Trusted Publisher config on
      # npmjs.com (package Settings -> Trusted Publisher -> this repo +
      # workflow filename). NODE_AUTH_TOKEN must be explicitly empty here —
      # setup-node's registry-url otherwise sets a default one that breaks OIDC.
      - run: npm publish --provenance --access public ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }}
        env:
          NODE_AUTH_TOKEN: ""
